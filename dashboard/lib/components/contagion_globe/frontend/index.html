<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Contagion Globe</title>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #000; color: #fff; }
    #deck { position: absolute; inset: 0; }
    /* Diagnostic overlay — visible only while the globe is still
       loading. Turns invisible once the first ArcLayer renders. */
    #status {
      position: absolute; top: 8px; left: 12px; z-index: 9;
      font: 12px/1.5 ui-monospace, monospace;
      color: rgba(255,255,255,0.55); pointer-events: none;
      text-shadow: 0 1px 2px rgba(0,0,0,0.8);
    }
  </style>
</head>
<body>
  <div id="deck"></div>
  <div id="status">init…</div>

  <script>
  (function () {
    // ─────────────────────────────────────────────────────────────
    // Streamlit component protocol — fire componentReady *before*
    // any async work. The "Your app is having trouble loading the
    // component" banner fires when Streamlit doesn't hear the ready
    // signal within ~5 s, so we want it sent immediately.
    // ─────────────────────────────────────────────────────────────
    function post(msg) {
      try { window.parent.postMessage(msg, '*'); } catch (e) {}
    }
    post({ type: 'streamlit:componentReady', apiVersion: 1 });
    post({ type: 'streamlit:setFrameHeight', height: 980 });

    const statusEl = document.getElementById('status');
    function setStatus(msg) {
      if (statusEl) statusEl.textContent = msg;
      console.log('[contagion_globe]', msg);
    }
    setStatus('waiting for deck.gl…');

    // Incoming render events are buffered until deck.gl is loaded —
    // Streamlit can fire streamlit:render any time, and the very
    // first render usually arrives before our async script tag has
    // finished fetching deck.gl.
    let pendingArgs = null;
    let deckInstance = null;

    window.addEventListener('message', function (event) {
      if (!event.data || event.data.type !== 'streamlit:render') return;
      pendingArgs = event.data.args || {};
      tryRender();
    });

    function tryRender() {
      if (!window.deck || !pendingArgs) return;
      try {
        onRender(pendingArgs);
      } catch (err) {
        setStatus('render error: ' + err.message);
      }
    }

    function buildLayers(args) {
      const layers = [];

      // Earth surface — NASA Black Marble texture bundled alongside
      // index.html so Streamlit serves it from the same origin. No
      // CORS, no external CDN fetch failure path.
      const nightLightsSrc = args.nightLightsUrl || './world_night.jpg';
      layers.push(new deck.BitmapLayer({
        id: 'night-lights',
        image: nightLightsSrc,
        bounds: [-180, -90, 180, 90],
        opacity: 1.0,
      }));

      // Destination countries — fill driven by each feature's
      // ql_fill property (computed Python-side from the current
      // correlation). updateTriggers on the fill accessor make
      // deck.gl re-evaluate colours when args.colourTrigger changes
      // (typically the selected date), even though the feature array
      // length stays constant.
      if (args.destinationFeatures && args.destinationFeatures.features) {
        layers.push(new deck.GeoJsonLayer({
          id: 'destinations',
          data: args.destinationFeatures,
          stroked: true,
          filled: true,
          getFillColor: function (f) { return f.properties.ql_fill || [71, 85, 105, 80]; },
          getLineColor: [255, 255, 255, 235],
          lineWidthMinPixels: 1.4,
          pickable: false,
          updateTriggers: { getFillColor: args.colourTrigger },
        }));
      }

      if (args.epicenterFeatures && args.epicenterFeatures.features) {
        layers.push(new deck.GeoJsonLayer({
          id: 'epicenter',
          data: args.epicenterFeatures,
          stroked: true,
          filled: true,
          getFillColor: [200, 30, 30, 150],
          getLineColor: [255, 180, 180, 240],
          lineWidthMinPixels: 1.6,
          pickable: false,
        }));
      }

      // Triple-layer neon glow arcs.
      var arcs = args.arcs || [];
      var triggers = { getSourceColor: args.colourTrigger, getTargetColor: args.colourTrigger, getWidth: args.colourTrigger };
      layers.push(new deck.ArcLayer({
        id: 'arc-outer', data: arcs,
        getSourcePosition: function (d) { return d.source; },
        getTargetPosition: function (d) { return d.target; },
        getSourceColor:    function (d) { return d.color; },
        getTargetColor:    function (d) { return d.color; },
        getWidth:          function (d) { return (d.width || 1) * 8; },
        widthMinPixels: 6, opacity: 0.06, greatCircle: true, pickable: false,
        updateTriggers: triggers,
      }));
      layers.push(new deck.ArcLayer({
        id: 'arc-glow', data: arcs,
        getSourcePosition: function (d) { return d.source; },
        getTargetPosition: function (d) { return d.target; },
        getSourceColor:    function (d) { return d.color; },
        getTargetColor:    function (d) { return d.color; },
        getWidth:          function (d) { return (d.width || 1) * 3; },
        widthMinPixels: 3, opacity: 0.18, greatCircle: true, pickable: false,
        updateTriggers: triggers,
      }));
      layers.push(new deck.ArcLayer({
        id: 'arc-core', data: arcs,
        getSourcePosition: function (d) { return d.source; },
        getTargetPosition: function (d) { return d.target; },
        getSourceColor:    function (d) { return d.color; },
        getTargetColor:    function (d) { return d.color; },
        getWidth:          function (d) { return (d.width || 1); },
        widthMinPixels: 1, opacity: 0.95, greatCircle: true, pickable: true,
        updateTriggers: triggers,
      }));

      return layers;
    }

    function onRender(args) {
      var layers = buildLayers(args);
      if (!deckInstance) {
        deckInstance = new deck.Deck({
          container: document.getElementById('deck'),
          // `_GlobeView` (leading underscore) is the canonical
          // deck.gl internal class name. Without it deck silently
          // falls back to a flat Mercator map.
          views: [new deck._GlobeView({ resolution: 10 })],
          initialViewState: args.viewState || {
            longitude: 56, latitude: 34, zoom: 1, pitch: 35, bearing: 0,
          },
          controller: true,
          parameters: { clearColor: [0, 0, 0, 1] },
          layers: layers,
        });
        setStatus('');   // clear the overlay once we've rendered
      } else {
        // Subsequent renders — only the layers change. deck.gl diffs
        // the layer list against the current scene and re-uploads
        // only what changed. No iframe reload, no WebGL re-init.
        deckInstance.setProps({ layers: layers });
      }
    }

    // Load deck.gl async with CDN fallback. The "trouble loading
    // component" banner used to fire because a synchronous
    // <script src=unpkg> at the top of this file blocked inline-
    // script execution while the CDN was slow, delaying
    // componentReady past Streamlit's timeout.
    function loadScript(url, onSuccess, onError) {
      var s = document.createElement('script');
      s.src = url; s.async = true;
      s.onload = onSuccess; s.onerror = onError;
      document.head.appendChild(s);
    }

    var CDN_PRIMARY   = 'https://cdn.jsdelivr.net/npm/deck.gl@9/dist.min.js';
    var CDN_FALLBACK  = 'https://unpkg.com/deck.gl@9/dist.min.js';

    loadScript(
      CDN_PRIMARY,
      function () { setStatus('deck.gl loaded'); tryRender(); },
      function () {
        setStatus('jsdelivr failed, trying unpkg');
        loadScript(
          CDN_FALLBACK,
          function () { setStatus('deck.gl loaded (unpkg)'); tryRender(); },
          function () { setStatus('deck.gl load FAILED'); }
        );
      }
    );
  })();
  </script>
</body>
</html>
