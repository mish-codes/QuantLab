<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Contagion Globe</title>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #000; }
    #deck { position: absolute; inset: 0; }
  </style>
</head>
<body>
  <div id="deck"></div>

  <!--
    deck.gl loaded from a CDN because Streamlit Cloud can't run an
    npm build step per component. Version pinned so future deck.gl
    breaking changes don't silently regress the globe.
  -->
  <script src="https://unpkg.com/deck.gl@9.0.33/dist.min.js"></script>
  <script>
  (function () {
    // ── Streamlit component protocol (vanilla — no streamlit-component-lib) ──
    // Parent → iframe:  { type: 'streamlit:render', args: {...}, ... }
    // iframe → parent:  componentReady, setFrameHeight, setComponentValue
    const Streamlit = {
      ready() {
        window.parent.postMessage({
          type: 'streamlit:componentReady',
          apiVersion: 1,
        }, '*');
      },
      setFrameHeight(h) {
        window.parent.postMessage({
          type: 'streamlit:setFrameHeight',
          height: h,
        }, '*');
      },
    };

    let deckInstance = null;

    function buildLayers(args) {
      const layers = [];

      // Earth surface — NASA Black Marble texture. jsDelivr URL set
      // from Python; browser caches it so subsequent renders don't
      // re-fetch.
      // Bundled JPG lives next to this index.html inside the component
      // directory, so Streamlit serves it from the same origin as the
      // iframe — no CORS / no CDN-fetch failure path. Python can
      // still override via args.nightLightsUrl if someone wants a
      // different texture; defaults to the bundled file.
      const nightLightsSrc = args.nightLightsUrl || './world_night.jpg';
      layers.push(new deck.BitmapLayer({
        id: 'night-lights',
        image: nightLightsSrc,
        bounds: [-180, -90, 180, 90],
        opacity: 1.0,
      }));

      // Destination countries — fill driven by each feature's
      // ql_fill property (the current rolling correlation mapped
      // through Python's RAG helper). deck.gl diffs GeoJsonLayer
      // props; when the accessor function result changes it just
      // re-uploads the colour buffer, no feature re-upload.
      if (args.destinationFeatures && args.destinationFeatures.features) {
        layers.push(new deck.GeoJsonLayer({
          id: 'destinations',
          data: args.destinationFeatures,
          stroked: true,
          filled: true,
          getFillColor: f => f.properties.ql_fill || [71, 85, 105, 80],
          getLineColor: [255, 255, 255, 235],
          lineWidthMinPixels: 1.4,
          pickable: false,
          updateTriggers: {
            getFillColor: args.colourTrigger,
          },
        }));
      }

      // Epicenter polygon — static red glow.
      if (args.epicenterFeatures && args.epicenterFeatures.features) {
        layers.push(new deck.GeoJsonLayer({
          id: 'epicenter',
          data: args.epicenterFeatures,
          stroked: true,
          filled: true,
          getFillColor: [200, 30, 30, 150],
          getLineColor: [255, 180, 180, 240],
          lineWidthMinPixels: 1.6,
          pickable: false,
        }));
      }

      // Triple-stack neon arcs: outer bloom + middle glow + thin
      // bright core. updateTriggers on the accessors make deck.gl
      // diff the arc array and only re-upload changed buffers.
      const arcs = args.arcs || [];
      const arcCommon = {
        data: arcs,
        getSourcePosition: d => d.source,
        getTargetPosition: d => d.target,
        getSourceColor: d => d.color,
        getTargetColor: d => d.color,
        greatCircle: true,
        updateTriggers: {
          getSourceColor: args.colourTrigger,
          getTargetColor: args.colourTrigger,
          getWidth: args.colourTrigger,
        },
      };
      layers.push(new deck.ArcLayer({
        ...arcCommon,
        id: 'arc-outer',
        getWidth: d => (d.width || 1) * 8,
        widthMinPixels: 6,
        opacity: 0.06,
        pickable: false,
      }));
      layers.push(new deck.ArcLayer({
        ...arcCommon,
        id: 'arc-glow',
        getWidth: d => (d.width || 1) * 3,
        widthMinPixels: 3,
        opacity: 0.18,
        pickable: false,
      }));
      layers.push(new deck.ArcLayer({
        ...arcCommon,
        id: 'arc-core',
        getWidth: d => (d.width || 1),
        widthMinPixels: 1,
        opacity: 0.95,
        pickable: true,
      }));

      return layers;
    }

    function onRender(args) {
      const layers = buildLayers(args);

      if (!deckInstance) {
        // First render — initialise the Deck instance. _GlobeView is
        // the deck.gl internal globe view (leading underscore is the
        // canonical class name; `GlobeView` without the underscore
        // silently falls back to a flat Mercator map).
        deckInstance = new deck.Deck({
          container: document.getElementById('deck'),
          views: [new deck._GlobeView({ resolution: 10 })],
          initialViewState: args.viewState || {
            longitude: 56.0,
            latitude: 34.0,
            zoom: 1.0,
            pitch: 35,
            bearing: 0,
          },
          controller: true,
          parameters: { clearColor: [0, 0, 0, 1] },
          layers,
        });
      } else {
        // Subsequent renders — only update layers. The iframe and
        // the Deck instance survive; deck.gl diffs the new layer
        // set against the current scene and re-uploads only what
        // changed. No iframe reload, no globe re-init. This is the
        // whole point of the custom component.
        deckInstance.setProps({ layers });
      }
    }

    window.addEventListener('message', (event) => {
      if (!event.data || event.data.type !== 'streamlit:render') return;
      onRender(event.data.args || {});
    });

    // Tell Streamlit we're ready to receive renders.
    Streamlit.ready();
    Streamlit.setFrameHeight(980);
  })();
  </script>
</body>
</html>
